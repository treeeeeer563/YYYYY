plugins {
    id 'com.android.application'
}

android {
    namespace 'ru.gosuslugi.app'
    compileSdk 35

    defaultConfig {
        applicationId "ru.gosuslugi.app"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
}
